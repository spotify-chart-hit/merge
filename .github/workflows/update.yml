name: Merge Charts

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: merge-charts
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Regional
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node fetch-regional.js

      - name: Fetch Album
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node fetch-album.js

      - name: Fetch Artist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node fetch-artist.js

      - name: Build Final
        run: node build-final.js

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "update merge"

            git pull --rebase origin main || true
            git push
          else
            echo "No changes"
          fi
